{% set version = "0.0.9" %}

package:
  name: modestpy
  version: {{ version }}

source:
  fn: modest-py-v.{{ version }}.tar.gz
  url: https://github.com/sdu-cfei/modest-py/archive/v.{{ version }}.tar.gz
  sha256: cb88a8d1fac906f53169aacd66aec2d49fb01b78b4db1c79656b371ad70bea27

build:
  noarch: python
  number: 2
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv"

requirements:
  build:
  host:
    - pip
    - setuptools
    - python
    - xorg-xorgproto                     # [linux]
    - xorg-libx11                        # [linux]
    - xorg-libxext                       # [linux]
    - xorg-libxrender                    # [linux]
    - libgl-devel                        # [linux]
    - libegl-devel                       # [linux]
    - xorg-libxau                        # [linux]
    - alsa-lib                           # [linux]
    - gtk2                               # [linux]
    - libdrm                             # [linux]
    - xorg-libxcomposite                 # [linux]
    - xorg-libxcursor                    # [linux]
    - xorg-libxi                         # [linux]
    - xorg-librandr                      # [linux]
    - xorg-libxscrnsaver                 # [linux]
    - xorg-libxtst                       # [linux]
    - xorg-libxdamage                    # [linux]
    - xorg-libxfixes                     # [linux]
  run:
    - python
    - scipy
    - pandas
    - matplotlib-base
    - pydoe
    - pyfmi

test:
  imports:
    - modestpy
    - modestpy.estim
    - modestpy.estim.ga
    - modestpy.estim.ps
    - modestpy.estim.scipy
    - modestpy.fmi
    - modestpy.utilities

about:
  home: https://github.com/sdu-cfei/modest-py
  license: BSD 2-clause
  license_file: LICENSE
  summary: FMI-compliant Model Estimation in Python

extra:
  recipe-maintainers:
    - jschueller
    - krzysztofarendt
